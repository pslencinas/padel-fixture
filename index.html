<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fixture Padel">
<title>Fixture Padel</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,sans-serif;background:#F0F4F8;color:#1A2733;min-height:100vh}
.hdr{background:#1A3A5C;color:#fff;padding:16px 16px 12px;text-align:center;position:sticky;top:0;z-index:99;box-shadow:0 2px 10px rgba(0,0,0,.25)}
.hdr h1{font-size:19px;font-weight:700}
.hdr p{font-size:11px;opacity:.7;margin-top:2px}
.tabs{display:flex;background:#1A3A5C;padding:0 10px 12px;gap:5px}
.tab{flex:1;padding:7px 2px;border-radius:20px;border:none;font-size:11px;font-weight:600;cursor:pointer;background:rgba(255,255,255,.15);color:rgba(255,255,255,.7);-webkit-appearance:none}
.tab.on{background:#fff;color:#1A3A5C}
.pg{padding:14px;max-width:480px;margin:0 auto;padding-bottom:30px}
.prog-wrap{background:#fff;border-radius:14px;padding:13px;margin-bottom:11px;box-shadow:0 2px 10px rgba(0,0,0,.09)}
.prog-lbl{display:flex;justify-content:space-between;font-size:13px;font-weight:600;color:#1A3A5C;margin-bottom:7px}
.prog-bar{height:8px;background:#E8EDF2;border-radius:4px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#2E75B6,#276836);transition:width .4s}
.card{background:#fff;border-radius:14px;box-shadow:0 2px 10px rgba(0,0,0,.09);margin-bottom:11px;overflow:hidden}
.rhdr{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;background:#1A3A5C;color:#fff;flex-wrap:wrap;gap:4px}
.rnum{font-size:14px;font-weight:700}
.rtime{font-size:11px;opacity:.75;background:rgba(255,255,255,.15);padding:2px 7px;border-radius:10px}
.rbadge{font-size:11px;background:#FFF2CC;color:#8B5E00;padding:2px 8px;border-radius:20px;font-weight:600}
.court{padding:11px 13px}
.court.sep{border-bottom:1px solid #EEF2F7}
.clbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px}
.clbl.b{color:#2E75B6}.clbl.g{color:#276836}
.mrow{display:flex;align-items:center;gap:5px}
.team{flex:1;text-align:center;font-size:12px;font-weight:600;line-height:1.4;color:#1A2733}
.team.wb{color:#2E75B6;font-weight:800}.team.wg{color:#276836;font-weight:800}
.wbadge{display:block;font-size:9px;font-weight:700;margin-top:1px}
.wbadge.b{color:#2E75B6}.wbadge.g{color:#276836}
.sarea{display:flex;align-items:center;gap:3px;flex-shrink:0}
.sbtn{width:36px;height:36px;border-radius:50%;border:2px solid #E8EDF2;font-size:14px;font-weight:700;cursor:pointer;background:#fff;color:#6B7A8D;-webkit-appearance:none}
.sbtn.ab{background:#2E75B6;color:#fff;border-color:#2E75B6}
.sbtn.ag{background:#276836;color:#fff;border-color:#276836}
.stxt{font-size:11px;font-weight:800;min-width:20px;text-align:center;color:#1A3A5C}
.score-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:9px;padding-top:9px;border-top:1px dashed #E8EDF2}
.score-lbl{font-size:10px;color:#6B7A8D;font-weight:600;flex:1;text-align:center}
.score-inp{width:44px;height:34px;border:2px solid #E8EDF2;border-radius:8px;text-align:center;font-size:16px;font-weight:700;color:#1A3A5C;background:#F8FAFC;-webkit-appearance:none}
.score-inp:focus{outline:none;border-color:#2E75B6}
.score-dash{font-size:18px;font-weight:700;color:#6B7A8D}
.rank-card{background:#fff;border-radius:14px;box-shadow:0 2px 10px rgba(0,0,0,.09);overflow:hidden;margin-bottom:11px}
.rank-hdr{background:#1A3A5C;color:#fff;padding:11px 15px;font-size:14px;font-weight:700}
.rank-row{display:flex;align-items:center;padding:10px 15px;border-bottom:1px solid #EEF2F7;gap:9px}
.rank-row:last-child{border-bottom:none}
.bubble{width:27px;height:27px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0}
.b1{background:#FFD700;color:#7A5800}.b2{background:#C0C0C0;color:#444}.b3{background:#CD7F32;color:#fff}.bx{background:#E8EDF2;color:#6B7A8D;font-size:11px}
.rinfo{flex:1}.rname{font-size:14px;font-weight:600}.rsub{font-size:10px;color:#6B7A8D;margin-top:1px}
.rbar{height:4px;background:#E8EDF2;border-radius:3px;margin-top:5px;overflow:hidden}
.rbar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#2E75B6,#5BA4E0);transition:width .5s}
.rwins{text-align:right}.rnum-big{font-size:20px;font-weight:800;color:#1A3A5C;line-height:1}.rlbl{font-size:10px;color:#6B7A8D}
.cruces-card{background:#fff;border-radius:14px;box-shadow:0 2px 10px rgba(0,0,0,.09);overflow:hidden;margin-bottom:11px}
.cruces-hdr{background:#1A3A5C;color:#fff;padding:11px 15px;font-size:14px;font-weight:700}
.cruce-row{padding:10px 14px;border-bottom:1px solid #EEF2F7}
.cruce-row:last-child{border-bottom:none}
.cruce-round{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:#6B7A8D;margin-bottom:6px}
.cruce-match{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.cruce-court{font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px;flex-shrink:0}
.cruce-court.b{background:#D6E8FA;color:#2E75B6}.cruce-court.g{background:#D5F0E0;color:#276836}
.cruce-teams{font-size:12px;font-weight:600;color:#1A2733;flex:1}
.cruce-rest{font-size:10px;color:#8B5E00;background:#FFF2CC;padding:2px 7px;border-radius:10px;margin-top:5px;display:inline-block}
.cruce-result{font-size:11px;font-weight:700;flex-shrink:0}
.cruce-result.b{color:#2E75B6}.cruce-result.g{color:#276836}
.mode-toggle{display:flex;background:#E8EDF2;border-radius:12px;padding:3px;margin-bottom:14px;gap:3px}
.mode-btn{flex:1;padding:9px 6px;border-radius:9px;border:none;font-size:13px;font-weight:600;cursor:pointer;background:transparent;color:#6B7A8D;-webkit-appearance:none;transition:all .2s}
.mode-btn.on{background:#fff;color:#1A3A5C;box-shadow:0 1px 4px rgba(0,0,0,.12)}
.section-card{background:#fff;border-radius:14px;box-shadow:0 2px 10px rgba(0,0,0,.09);margin-bottom:11px;overflow:hidden}
.section-hdr{background:#1A3A5C;color:#fff;padding:10px 14px;font-size:13px;font-weight:700}
.manual-round{padding:12px 14px;border-bottom:1px solid #EEF2F7}
.manual-round:last-child{border-bottom:none}
.manual-round-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:#6B7A8D;margin-bottom:10px}
.manual-court-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
.manual-court-label.b{color:#2E75B6}.manual-court-label.g{color:#276836}
.pair-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.pair-sel{flex:1;height:34px;border:2px solid #E8EDF2;border-radius:8px;font-size:13px;font-weight:600;color:#1A3A5C;background:#F8FAFC;padding:0 8px;-webkit-appearance:none}
.pair-court-block{margin-bottom:10px}
.rest-sel-row{display:flex;gap:6px;margin-top:8px;padding-top:8px;border-top:1px dashed #E8EDF2}
.rest-sel{flex:1;height:32px;border:2px solid #FFF2CC;border-radius:8px;font-size:12px;font-weight:600;color:#8B5E00;background:#FFFDF0;padding:0 8px;-webkit-appearance:none}
.apply-btn{width:100%;padding:13px;border-radius:14px;border:none;background:#1A3A5C;color:#fff;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px;-webkit-appearance:none}
.warn-box{background:#FFF2CC;border-radius:10px;padding:9px 12px;margin-bottom:10px;font-size:11px;color:#8B5E00;line-height:1.5}
.ok-box{background:#D5F0E0;border-radius:10px;padding:9px 12px;margin-bottom:10px;font-size:11px;color:#276836;line-height:1.5}
.info-box{background:#EBF3FB;border-radius:10px;padding:10px 13px;margin-bottom:11px;font-size:11px;color:#1A3A5C;line-height:1.5}
.empty{text-align:center;padding:36px 20px;color:#6B7A8D}
.empty .ico{font-size:44px;margin-bottom:10px}
.champ{background:linear-gradient(135deg,#FFD700,#FFA500);padding:18px;text-align:center;border-radius:14px;margin-bottom:11px;box-shadow:0 2px 10px rgba(0,0,0,.1)}
.reset-btn{width:100%;padding:13px;border-radius:14px;border:2px solid #C0392B;background:#fff;color:#C0392B;font-size:13px;font-weight:700;cursor:pointer;margin-top:2px;-webkit-appearance:none}
</style>
</head>
<body>
<div class="hdr">
  <h1>Fixture Padel</h1>
  <p>2 canchas · 10 chicas · 5 rondas · 4 partidos c/u · 24 min</p>
</div>
<div class="tabs">
  <button class="tab on" id="t-fix"    onclick="showTab('fixture')">Fixture</button>
  <button class="tab"    id="t-rank"   onclick="showTab('ranking')">Ranking</button>
  <button class="tab"    id="t-cruces" onclick="showTab('cruces')">Cruces</button>
  <button class="tab"    id="t-par"    onclick="showTab('parejas')">Parejas</button>
</div>
<div id="pg-fixture"  class="pg"></div>
<div id="pg-ranking"  class="pg" style="display:none"></div>
<div id="pg-cruces"   class="pg" style="display:none"></div>
<div id="pg-parejas"  class="pg" style="display:none"></div>
<script>
var PLAYERS=["Caro","Maru","Vale","Ani","Flor","Jime","Ceci","Dani","Maga","Ale"];
var POS={Caro:"Drive",Maru:"Drive/Rev\u00e9s",Vale:"Rev\u00e9s",Ani:"Rev\u00e9s",Flor:"Rev\u00e9s/Drive",Jime:"Rev\u00e9s",Ceci:"Rev\u00e9s",Dani:"Drive",Maga:"Drive",Ale:"Drive"};
var TIMES=["9:30","9:54","10:18","10:42","11:06"];
var RANDOM_ROUNDS=[
  {c1a:["Dani","Flor"],c1b:["Maga","Vale"],c2a:["Ceci","Jime"],c2b:["Ale","Ani"],r1:"Caro",r2:"Maru"},
  {c1a:["Jime","Maga"],c1b:["Ceci","Flor"],c2a:["Maru","Ale"],c2b:["Dani","Caro"],r1:"Vale",r2:"Ani"},
  {c1a:["Dani","Maru"],c1b:["Caro","Ale"],c2a:["Ceci","Vale"],c2b:["Maga","Ani"],r1:"Flor",r2:"Jime"},
  {c1a:["Maga","Flor"],c1b:["Jime","Ale"],c2a:["Vale","Maru"],c2b:["Caro","Ani"],r1:"Ceci",r2:"Dani"},
  {c1a:["Dani","Ani"],c1b:["Vale","Jime"],c2a:["Caro","Flor"],c2b:["Ceci","Maru"],r1:"Maga",r2:"Ale"}
];
var MANUAL_ROUNDS=RANDOM_ROUNDS.map(function(r){
  return {c1a:r.c1a.slice(),c1b:r.c1b.slice(),c2a:r.c2a.slice(),c2b:r.c2b.slice(),r1:r.r1,r2:r.r2};
});
var activeMode="random";
function getRounds(){return activeMode==="random"?RANDOM_ROUNDS:MANUAL_ROUNDS;}
var scores=Array(5).fill(null).map(function(){return [{winner:0,sa:"",sb:""},{winner:0,sa:"",sb:""}];});
try{var _sv=sessionStorage.getItem("pf4");if(_sv){var _p=JSON.parse(_sv);scores=_p.scores;if(_p.mode)activeMode=_p.mode;if(_p.manual)MANUAL_ROUNDS=_p.manual;}}catch(e){}
function save(){try{sessionStorage.setItem("pf4",JSON.stringify({scores:scores,mode:activeMode,manual:MANUAL_ROUNDS}));}catch(e){}}
function toggleWinner(ri,ci,w){scores[ri][ci].winner=scores[ri][ci].winner===w?0:w;save();render();}
function updateScore(ri,ci,side,val){
  if(side===0||side==="0"||side==="a")scores[ri][ci].sa=val;else scores[ri][ci].sb=val;
  var sa=parseInt(scores[ri][ci].sa),sb=parseInt(scores[ri][ci].sb);
  if(!isNaN(sa)&&!isNaN(sb)&&sa!==sb)scores[ri][ci].winner=sa>sb?1:2;
  save();renderRanking();renderCruces();
}
function done(){var n=0;scores.forEach(function(r){r.forEach(function(c){if(c.winner!==0)n++;});});return n;}
function ranking(){
  var rounds=getRounds(),st={};
  PLAYERS.forEach(function(p){st[p]={wins:0,played:0,rests:0,gf:0,gc:0};});
  rounds.forEach(function(round,ri){
    if(round.r1)st[round.r1].rests++;
    if(round.r2)st[round.r2].rests++;
    [[round.c1a,round.c1b,0],[round.c2a,round.c2b,1]].forEach(function(x){
      var tA=x[0],tB=x[1],ci=x[2],sc=scores[ri][ci];
      var res=sc.winner,sa=parseInt(sc.sa)||0,sb=parseInt(sc.sb)||0;
      if(res!==0){tA.forEach(function(p){st[p].played++;st[p].gf+=sa;st[p].gc+=sb;});tB.forEach(function(p){st[p].played++;st[p].gf+=sb;st[p].gc+=sa;});}
      if(res===1)tA.forEach(function(p){st[p].wins++;});
      if(res===2)tB.forEach(function(p){st[p].wins++;});
    });
  });
  return PLAYERS.map(function(p){var s=st[p];return {name:p,wins:s.wins,played:s.played,rests:s.rests,gf:s.gf,gc:s.gc,diff:s.gf-s.gc};})
    .sort(function(a,b){return b.wins-a.wins||b.diff-a.diff||b.gf-a.gf;});
}
function renderFixture(){
  var d=done(),pct=Math.round(d/10*100);
  var rounds=getRounds();
  var modeTag="["+( activeMode==="random"?"Random":"Manual")+"]";
  var h='<div class="prog-wrap"><div class="prog-lbl"><span>Partidos jugados '+modeTag+'</span><span>'+d+' / 10</span></div>'
    +'<div class="prog-bar"><div class="prog-fill" style="width:'+pct+'%"></div></div></div>';
  rounds.forEach(function(round,ri){
    h+='<div class="card">'
      +'<div class="rhdr"><span class="rnum">Ronda '+(ri+1)+'</span>'
      +'<span class="rtime">'+TIMES[ri]+'</span>'
      +'<span class="rbadge">Desc: '+(round.r1||"?")+" / "+(round.r2||"?")+'</span></div>'
      +makeCourt(ri,0,round.c1a,round.c1b,false)
      +makeCourt(ri,1,round.c2a,round.c2b,true)
      +"</div>";
  });
  h+='<button class="reset-btn" onclick="resetAll()">Reiniciar resultados</button>';
  document.getElementById("pg-fixture").innerHTML=h;
}
function makeCourt(ri,ci,tA,tB,green){
  var sc=scores[ri][ci],res=sc.winner;
  var aW=res===1,bW=res===2,col=green?"g":"b";
  var aClass="team"+(aW?" w"+col:"");
  var bClass="team"+(bW?" w"+col:"");
  var aBtnClass="sbtn"+(aW?" a"+col:"");
  var bBtnClass="sbtn"+(bW?" a"+col:"");
  var stxt=res===0?"vs":res===1?"A gana":"B gana";
  var aWinBadge=aW?'<span class="wbadge '+col+'">Gano</span>':"";
  var bWinBadge=bW?'<span class="wbadge '+col+'">Gano</span>':"";
  var oc_a="updateScore("+ri+","+ci+",0,this.value)";
  var oc_b="updateScore("+ri+","+ci+",1,this.value)";
  return '<div class="court'+(ci===0?" sep":"")+'"><div class="clbl '+col+'">Cancha '+(ci+1)+'</div>'
    +'<div class="mrow">'
    +'<div class="'+aClass+'">'+tA[0]+'<br>'+tA[1]+aWinBadge+'</div>'
    +'<div class="sarea">'
    +'<button class="'+aBtnClass+'" onclick="toggleWinner('+ri+','+ci+',1)">A</button>'
    +'<span class="stxt">'+stxt+'</span>'
    +'<button class="'+bBtnClass+'" onclick="toggleWinner('+ri+','+ci+',2)">B</button>'
    +'</div>'
    +'<div class="'+bClass+'">'+tB[0]+'<br>'+tB[1]+bWinBadge+'</div>'
    +'</div>'
    +'<div class="score-row">'
    +'<div class="score-lbl">'+tA[0]+' / '+tA[1]+'</div>'
    +'<input class="score-inp" type="number" min="0" max="99" inputmode="numeric" placeholder="-" value="'+sc.sa+'" onchange="'+oc_a+'" oninput="'+oc_a+'">'
    +'<span class="score-dash">-</span>'
    +'<input class="score-inp" type="number" min="0" max="99" inputmode="numeric" placeholder="-" value="'+sc.sb+'" onchange="'+oc_b+'" oninput="'+oc_b+'">'
    +'<div class="score-lbl">'+tB[0]+' / '+tB[1]+'</div>'
    +'</div></div>';
}
function renderRanking(){
  var d=done(),el=document.getElementById("pg-ranking");
  if(d===0){el.innerHTML='<div class="empty"><div class="ico">&#127942;</div><p>Carga resultados en <strong>Fixture</strong><br>para ver el ranking.</p></div>';return;}
  var rank=ranking(),maxW=rank.reduce(function(m,r){return Math.max(m,r.wins);},1);
  var h="";
  if(d===10){h+='<div class="champ"><div style="font-size:44px">&#127942;</div><div style="font-size:13px;font-weight:700;color:#7A4800">Campeona del torneo!</div><div style="font-size:26px;font-weight:800;color:#1A2733">'+rank[0].name+'</div><div style="font-size:12px;color:#7A4800;margin-top:3px">'+rank[0].wins+' victorias</div></div>';}
  h+='<div class="rank-card"><div class="rank-hdr">Ranking - '+d+' partido'+(d!==1?"s":"")+'</div>';
  rank.forEach(function(p,i){
    var bc=i===0?"b1":i===1?"b2":i===2?"b3":"bx";
    var pct=Math.round(p.wins/maxW*100);
    var losses=p.played-p.wins;
    var diffStr=(p.diff>0?"+":"")+p.diff;
    h+='<div class="rank-row">'
      +'<div class="bubble '+bc+'">'+(i+1)+'</div>'
      +'<div class="rinfo"><div class="rname">'+p.name+'</div>'
      +'<div class="rsub">'+POS[p.name]+' - '+p.rests+' desc.</div>'
      +'<div style="display:flex;gap:5px;margin-top:5px;flex-wrap:wrap">'
      +'<span style="font-size:10px;font-weight:700;background:#D5F0E0;color:#276836;padding:2px 7px;border-radius:8px">V: '+p.wins+'</span>'
      +'<span style="font-size:10px;font-weight:700;background:#FDECEA;color:#C0392B;padding:2px 7px;border-radius:8px">D: '+losses+'</span>'
      +(p.played>0?'<span style="font-size:10px;font-weight:700;background:#EBF3FB;color:#2E75B6;padding:2px 7px;border-radius:8px">'+p.gf+':'+p.gc+' ('+diffStr+')</span>':"")
      +'</div>'
      +'<div class="rbar"><div class="rbar-fill" style="width:'+pct+'%"></div></div></div>'
      +'<div class="rwins"><div class="rnum-big">'+p.wins+'</div><div class="rlbl">vic'+(p.wins!==1?"s":"")+'</div></div>'
      +'</div>';
  });
  h+="</div>";
  el.innerHTML=h;
}
function renderCruces(){
  var rounds=getRounds();
  var h='<div class="info-box">5 rondas - 4 partidos por jugadora - Todas descansan 1 vez - Modo: '+(activeMode==="random"?"Random":"Manual")+'</div>';
  h+='<div class="cruces-card"><div class="cruces-hdr">Programa de partidos</div>';
  rounds.forEach(function(round,ri){
    var sc1=scores[ri][0],sc2=scores[ri][1];
    var r1txt=(sc1.sa&&sc1.sb)?sc1.sa+"-"+sc1.sb:"";
    var r2txt=(sc2.sa&&sc2.sb)?sc2.sa+"-"+sc2.sb:"";
    h+='<div class="cruce-row"><div class="cruce-round">Ronda '+(ri+1)+' - '+TIMES[ri]+'</div>'
      +'<div class="cruce-match"><span class="cruce-court b">C1</span>'
      +'<span class="cruce-teams">'+round.c1a[0]+'/'+round.c1a[1]+' vs '+round.c1b[0]+'/'+round.c1b[1]+'</span>'
      +(r1txt?'<span class="cruce-result b">'+r1txt+'</span>':"")+'</div>'
      +'<div class="cruce-match"><span class="cruce-court g">C2</span>'
      +'<span class="cruce-teams">'+round.c2a[0]+'/'+round.c2a[1]+' vs '+round.c2b[0]+'/'+round.c2b[1]+'</span>'
      +(r2txt?'<span class="cruce-result g">'+r2txt+'</span>':"")+'</div>'
      +'<span class="cruce-rest">Desc: '+(round.r1||"?")+' / '+(round.r2||"?")+'</span>'
      +'</div>';
  });
  h+="</div>";
  h+='<div class="cruces-card"><div class="cruces-hdr">Jugadoras</div>';
  var pc={};PLAYERS.forEach(function(p){pc[p]=0;});
  rounds.forEach(function(r){[r.c1a,r.c1b,r.c2a,r.c2b].forEach(function(t){t.forEach(function(p){if(pc[p]!==undefined)pc[p]++;});});});
  PLAYERS.forEach(function(p,i){
    h+='<div style="display:flex;align-items:center;padding:9px 14px;border-bottom:'+(i<PLAYERS.length-1?"1px solid #EEF2F7":"none")+'">'
      +'<div style="width:22px;height:22px;border-radius:50%;background:#E8EDF2;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#6B7A8D;flex-shrink:0">'+(i+1)+'</div>'
      +'<div style="flex:1;margin-left:10px"><div style="font-size:14px;font-weight:600">'+p+'</div>'
      +'<div style="font-size:10px;color:#6B7A8D">'+POS[p]+' - '+pc[p]+' partidos - '+(5-pc[p])+' descanso'+(5-pc[p]!==1?"s":"")+'</div></div>'
      +'</div>';
  });
  h+="</div>";
  document.getElementById("pg-cruces").innerHTML=h;
}
var pairsMode="random";
function shuffleRandom(){
  // Fisher-Yates shuffle to reassign pairs, keeping rest schedule fixed
  var rest_schedule=[["Caro","Maru"],["Vale","Ani"],["Flor","Jime"],["Ceci","Dani"],["Maga","Ale"]];
  function pk(a,b){return (a<b)?[a,b]:[b,a];}
  var pc={};
  function addPair(a,b){var k=pk(a,b).join("|");pc[k]=(pc[k]||0)+1;}
  function pairScore(a,b){var k=pk(a,b).join("|");return (pc[k]||0);}

  var rounds=[];
  for(var ri=0;ri<5;ri++){
    var r1=rest_schedule[ri][0],r2=rest_schedule[ri][1];
    var playing=PLAYERS.filter(function(p){return p!==r1&&p!==r2;});
    var best=null,bestScore=99999;
    for(var attempt=0;attempt<2000;attempt++){
      // shuffle playing
      for(var i=playing.length-1;i>0;i--){
        var j=Math.floor(Math.random()*(i+1));
        var tmp=playing[i];playing[i]=playing[j];playing[j]=tmp;
      }
      var c1=playing.slice(0,4),c2=playing.slice(4);
      var pairings1=[[[c1[0],c1[1]],[c1[2],c1[3]]],[[c1[0],c1[2]],[c1[1],c1[3]]],[[c1[0],c1[3]],[c1[1],c1[2]]]];
      var pairings2=[[[c2[0],c2[1]],[c2[2],c2[3]]],[[c2[0],c2[2]],[c2[1],c2[3]]],[[c2[0],c2[3]],[c2[1],c2[2]]]];
      for(var pi=0;pi<3;pi++){for(var pj=0;pj<3;pj++){
        var p1=pairings1[pi],p2=pairings2[pj];
        var s=0;
        [p1[0],p1[1],p2[0],p2[1]].forEach(function(t){s+=Math.pow(pairScore(t[0],t[1])+1,2);});
        if(s<bestScore){bestScore=s;best={c1a:p1[0],c1b:p1[1],c2a:p2[0],c2b:p2[1],r1:r1,r2:r2};}
      }}
    }
    rounds.push(best);
    [best.c1a,best.c1b,best.c2a,best.c2b].forEach(function(t){addPair(t[0],t[1]);});
  }
  for(var i=0;i<5;i++) RANDOM_ROUNDS[i]=rounds[i];
  // reset scores
  scores=Array(5).fill(null).map(function(){return [{winner:0,sa:"",sb:""},{winner:0,sa:"",sb:""}];});
  activeMode="random";
  save();render();
}

function renderParejas(){
  var onR="setPairsMode('random')";
  var onM="setPairsMode('manual')";
  var activeR=pairsMode==="random"?" on":"";
  var activeM=pairsMode==="manual"?" on":"";
  var h='<div class="mode-toggle">'
    +'<button class="mode-btn'+activeR+'" onclick="'+onR+'">Random</button>'
    +'<button class="mode-btn'+activeM+'" onclick="'+onM+'">Manual</button>'
    +'</div>';
  if(pairsMode==="random"){
    h+='<div class="ok-box">Fixture generado automaticamente: 5 rondas, todas juegan 4 partidos, todas descansan 1 vez, sin parejas repetidas.</div>';
    h+='<button class="apply-btn" style="margin-bottom:11px;background:#2E75B6" onclick="shuffleRandom()">Mezclar de nuevo las parejas</button>';
    h+='<div class="section-card"><div class="section-hdr">Parejas del fixture</div>';
    RANDOM_ROUNDS.forEach(function(r,i){
      h+='<div style="padding:10px 14px;border-bottom:'+(i<4?"1px solid #EEF2F7":"none")+'">'
        +'<div style="font-size:10px;font-weight:700;text-transform:uppercase;color:#6B7A8D;margin-bottom:6px">Ronda '+(i+1)+' - '+TIMES[i]+'</div>'
        +'<div style="font-size:12px;margin-bottom:3px"><span style="font-size:9px;font-weight:700;background:#D6E8FA;color:#2E75B6;padding:1px 5px;border-radius:6px;margin-right:5px">C1</span>'+r.c1a[0]+'/'+r.c1a[1]+' vs '+r.c1b[0]+'/'+r.c1b[1]+'</div>'
        +'<div style="font-size:12px;margin-bottom:4px"><span style="font-size:9px;font-weight:700;background:#D5F0E0;color:#276836;padding:1px 5px;border-radius:6px;margin-right:5px">C2</span>'+r.c2a[0]+'/'+r.c2a[1]+' vs '+r.c2b[0]+'/'+r.c2b[1]+'</div>'
        +'<span style="font-size:10px;color:#8B5E00;background:#FFF2CC;padding:2px 7px;border-radius:10px">Desc: '+r.r1+' / '+r.r2+'</span>'
        +'</div>';
    });
    h+="</div>";
    if(activeMode!=="random"){
      h+='<button class="apply-btn" onclick="applyMode(\'random\')">Usar este fixture</button>';
    }else{
      h+='<div class="ok-box" style="margin-top:4px">Este es el modo activo.</div>';
    }
  }else{
    h+='<div class="warn-box">Selecciona las dos jugadoras de cada pareja por ronda. Los cruces (quien juega contra quien) se arman automaticamente en el fixture.</div>';
    h+='<div class="section-card"><div class="section-hdr">Configurar parejas</div>';
    for(var ri=0;ri<5;ri++){
      var mr=MANUAL_ROUNDS[ri];
      h+='<div class="manual-round"><div class="manual-round-title">Ronda '+(ri+1)+' - '+TIMES[ri]+' - Desc: '+(mr.r1||"?")+" / "+(mr.r2||"?")+'</div>'
        +'<div class="pair-court-block"><div class="manual-court-label b">Cancha 1 - Pareja A</div>'
        +'<div class="pair-row">'+mkSel(ri,"c1a",0,mr.c1a[0])+mkSel(ri,"c1a",1,mr.c1a[1])+'</div>'
        +'<div class="manual-court-label b" style="margin-top:8px">Cancha 1 - Pareja B</div>'
        +'<div class="pair-row">'+mkSel(ri,"c1b",0,mr.c1b[0])+mkSel(ri,"c1b",1,mr.c1b[1])+'</div></div>'
        +'<div class="pair-court-block"><div class="manual-court-label g">Cancha 2 - Pareja A</div>'
        +'<div class="pair-row">'+mkSel(ri,"c2a",0,mr.c2a[0])+mkSel(ri,"c2a",1,mr.c2a[1])+'</div>'
        +'<div class="manual-court-label g" style="margin-top:8px">Cancha 2 - Pareja B</div>'
        +'<div class="pair-row">'+mkSel(ri,"c2b",0,mr.c2b[0])+mkSel(ri,"c2b",1,mr.c2b[1])+'</div></div>'
        +'</div>';
    }
    h+="</div>";
    h+='<button class="apply-btn" onclick="applyManual()">Aplicar al fixture</button>';
  }
  document.getElementById("pg-parejas").innerHTML=h;
}
function mkSel(ri,field,idx,selected){
  var opts='<option value="">-</option>';
  PLAYERS.forEach(function(p){opts+='<option value="'+p+'"'+(p===selected?' selected':"")+'>'+p+'</option>';});
  return '<select class="pair-sel" onchange="updM('+ri+',"'+field+'",'+idx+',this.value)">'+opts+'</select>';
}
function mkRestSel(ri,idx,selected){
  var opts='<option value="">-</option>';
  PLAYERS.forEach(function(p){opts+='<option value="'+p+'"'+(p===selected?' selected':"")+'>'+p+'</option>';});
  return '<select class="rest-sel" onchange="updR('+ri+','+idx+',this.value)">'+opts+'</select>';
}
function updM(ri,field,idx,val){MANUAL_ROUNDS[ri][field][idx]=val;save();}
function updR(ri,idx,val){if(idx===0)MANUAL_ROUNDS[ri].r1=val;else MANUAL_ROUNDS[ri].r2=val;save();}
function setPairsMode(m){pairsMode=m;renderParejas();}
function applyMode(m){activeMode=m;save();render();showTab("fixture");}
function applyManual(){
  var warnings=[];
  MANUAL_ROUNDS.forEach(function(r,i){
    var all=[r.c1a[0],r.c1a[1],r.c1b[0],r.c1b[1],r.c2a[0],r.c2a[1],r.c2b[0],r.c2b[1],r.r1,r.r2];
    var filled=all.filter(function(p){return p&&p!=="";});
    var unique=filled.filter(function(p,j){return filled.indexOf(p)===j;});
    if(filled.length<10)warnings.push("Ronda "+(i+1)+": faltan jugadoras");
    else if(unique.length<10)warnings.push("Ronda "+(i+1)+": hay jugadoras repetidas");
  });
  if(warnings.length>0){alert("Errores:\n"+warnings.join("\n"));return;}
  activeMode="manual";save();render();showTab("fixture");
}
function render(){renderFixture();renderRanking();renderCruces();renderParejas();}
function showTab(t){
  ["fixture","ranking","cruces","parejas"].forEach(function(id){
    document.getElementById("pg-"+id).style.display=t===id?"block":"none";
  });
  document.getElementById("t-fix").className="tab"+(t==="fixture"?" on":"");
  document.getElementById("t-rank").className="tab"+(t==="ranking"?" on":"");
  document.getElementById("t-cruces").className="tab"+(t==="cruces"?" on":"");
  document.getElementById("t-par").className="tab"+(t==="parejas"?" on":"");
}
function resetAll(){
  if(confirm("Reiniciar todos los resultados?")){
    scores=Array(5).fill(null).map(function(){return [{winner:0,sa:"",sb:""},{winner:0,sa:"",sb:""}];});
    save();render();
  }
}
render();
</script>
